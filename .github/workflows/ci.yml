name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref (a force-push or a second push
# to a PR) so we don't burn metered private-repo minutes finishing a
# run nobody is waiting on. The main-branch push runs are keyed by SHA
# so they are never cancelled.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          # Only the main-branch build writes the cache; PR builds
          # restore-only. A cancelled or partial PR build must never
          # save a half-populated target/ under the (Cargo.lock-stable,
          # hence immutable) key — once a bad cache wins that key, every
          # later run restores it, says "up-to-date", and silently
          # recompiles all deps. main always produces a complete cache.
          save-if: ${{ github.ref == 'refs/heads/main' }}
      # Both feature modes, mirroring `make clippy`.
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  doc:
    name: rustdoc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      # Catches broken intra-doc links in both feature modes (`make doc`).
      - run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: -D warnings
      - run: cargo doc --workspace --no-deps --all-features
        env:
          RUSTDOCFLAGS: -D warnings

  # Per-PR test tier: hermetic only (Tier A + B), Linux only. Fast,
  # deterministic, no real network. The real-n0 tier and macOS coverage
  # run in the scheduled `nightly` workflow instead — they are slower,
  # network-dependent (n0 dials the public relay), and macOS minutes are
  # ~10x on a private repo.
  test:
    name: test (ubuntu / hermetic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: taiki-e/install-action@v2
        with:
          tool: nextest
      # Verify the default-feature config compiles (the clippy job only
      # lints it; this catches a default-only build break). `iroh` and
      # `test-utils` are unified on for the test build via each crate's
      # self dev-dependency, so the *test set* is identical in both
      # feature modes (confirmed: same 808 tests) — `--all-features` is
      # the strict superset. We therefore run the suite ONCE, under
      # all-features, rather than twice; the default-feature build above
      # preserves the "does it still compile without the extras" signal
      # without paying for a second full 800-test run.
      - run: cargo build --workspace --all-targets
      - run: cargo nextest run --workspace --profile ci --all-features
      - run: cargo test --workspace --doc --all-features
