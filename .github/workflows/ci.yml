name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref (a force-push or a second push
# to a PR) so we don't burn metered private-repo minutes finishing a
# run nobody is waiting on. The main-branch push runs are keyed by SHA
# so they are never cancelled.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          # Only the main-branch build writes the cache; PR builds
          # restore-only. A cancelled or partial PR build must never
          # save a half-populated target/ under the (Cargo.lock-stable,
          # hence immutable) key — once a bad cache wins that key, every
          # later run restores it, says "up-to-date", and silently
          # recompiles all deps. main always produces a complete cache.
          save-if: ${{ github.ref == 'refs/heads/main' }}
      # All three feature modes, mirroring `make clippy`. The
      # no-default-features pass has no test tier of its own, so this
      # lint is the only CI signal for that build mode. It must NOT use
      # `--all-targets`: test targets activate the self dev-dependency
      # (`features = ["test-utils"]`) and feature unification turns
      # `iroh` back on for the lib, masking no-iroh breakage.
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo clippy --workspace --no-default-features -- -D warnings

  doc:
    name: rustdoc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      # Catches broken intra-doc links in both feature modes (`make doc`).
      - run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: -D warnings
      - run: cargo doc --workspace --no-deps --all-features
        env:
          RUSTDOCFLAGS: -D warnings

  # Per-PR test tier: hermetic only (Tier A + B), Linux only. Fast,
  # deterministic, no real network. The real-n0 tier and macOS coverage
  # run in the scheduled `nightly` workflow instead — they are slower,
  # network-dependent (n0 dials the public relay), and macOS minutes are
  # ~10x on a private repo.
  test:
    name: test (ubuntu / hermetic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          # llvm-tools ships the profdata/cov binaries cargo-llvm-cov
          # drives for the instrumented `make test` run below.
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: taiki-e/install-action@v2
        with:
          tool: nextest,cargo-llvm-cov
      # Same entry point developers use: instrumented all-features
      # nextest run with a coverage summary, plus all-features doctests.
      # nextest builds everything it runs (test bins + crate bins), so
      # no separate build step is needed; the default- and no-default-
      # feature configs get their compile signal from the clippy and
      # doc jobs. The instrumented build lives in
      # target/llvm-cov-target, which Swatinem/rust-cache picks up
      # along with target/ — first run on a fresh cache pays a full
      # instrumented rebuild.
      - run: make test
